# PSA 10 Profit Scanner — Elite Edition v2.0
# ─────────────────────────────────────────────────────────────
# Get eBay keys FREE at: https://developer.ebay.com
# Use PRODUCTION keys (not Sandbox) to access live listings.

ebay:
  app_id:  "YOUR-EBAY-APP-ID-HERE"
  cert_id: "YOUR-EBAY-CERT-ID-HERE"
  dev_id:  "YOUR-EBAY-DEV-ID-HERE"

# ── CV Grading Thresholds ─────────────────────────────────────
thresholds:
  # Minimum image resolution (pixels). Below = stock photo / reject.
  min_image_px: 1000

  # 55/45 PSA 10 front centering standard (0.55 = strict)
  centering_front: 0.55

  # 75/25 PSA 10 back centering standard (more lenient)
  centering_back: 0.75

  # White pixel count in corner patch to flag whitening
  white_pixel_cluster: 25

  # Fraction of holo area overexposed before glint flag fires
  glint_fraction: 0.02

  # Laplacian edge density in glare zone → scratch flag
  scratch_edge_density: 0.003

  # NCC block similarity threshold for clone-stamp detection
  clone_ncc_threshold: 0.97

  # FFT rosette frequency band (CMYK dot pattern detection)
  rosette_frequency_band: 45

# ── Financial Defaults ────────────────────────────────────────
financials:
  grading_fee: 25.00
  shipping_estimate: 6.00

# ── Notification Threshold ────────────────────────────────────
# Fire an alert when PSA 10 confidence exceeds this %
notification_threshold: 70
